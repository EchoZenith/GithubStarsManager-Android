name: Build Android Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Extract version from tag and update app.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const path = 'app.json';
            let cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            cfg.expo.version = '$TAG_VERSION';
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
            console.log('Version set to $TAG_VERSION');
          "

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Expo and prebuild
        run: npx expo prebuild --platform android --clean

      - name: Enable ABI splits for per-architecture APKs
        run: node .github/scripts/configure-splits.js

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "Keystore decoded successfully"
          else
            echo "KEYSTORE_BASE64 not set, building without signing"
          fi

      - name: Build release APKs (per architecture)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Build release AAB (universal)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Rename APKs with version and architecture suffix
        run: |
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            case "$apk" in
              *armeabi*|*armeabi-v7a*) suffix="armeabi-v7a" ;;
              *arm64*)                suffix="arm64-v8a" ;;
              *x86_64*)              suffix="x86_64" ;;
              *)                      suffix="universal" ;;
            esac
            mv "$apk" "GithubStarsManager-v${APP_VERSION}-${suffix}.apk"
          done

      - name: Rename AAB
        run: |
          cd android/app/build/outputs/bundle/release
          mv *.aab "GithubStarsManager-v${APP_VERSION}.aab"

      - name: Upload per-architecture APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: android/app/build/outputs/apk/release/GithubStarsManager-v*.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/GithubStarsManager-v*.aab
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            android/app/build/outputs/apk/release/GithubStarsManager-v*.apk
            android/app/build/outputs/bundle/release/GithubStarsManager-v*.aab
          generate_release_notes: true
